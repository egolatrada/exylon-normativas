<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="Normativa pública de comercios y talleres — EXYLON Roleplay.">
  <title>Normativa · EXYLON</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --text: #f4f4f6;
      --text-soft: #c4c4ce;
      --muted: #6e6e78;
      --accent: #850e49;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: "Montserrat", system-ui, sans-serif;
      color: var(--text);
      background-color: #000;
      background-image:
        radial-gradient(ellipse 95% 80% at 92% -8%, rgba(133, 14, 73, 0.62) 0%, transparent 50%),
        radial-gradient(ellipse 55% 50% at -5% 102%, rgba(133, 14, 73, 0.2) 0%, transparent 55%),
        linear-gradient(148deg, #000000 0%, #060204 38%, #120610 72%, #2a0618 100%);
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.14;
      mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
    .wrap {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem 3rem;
      text-align: center;
    }
    .kicker {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      margin: 0 0 1rem;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.38);
    }
    .kicker::before,
    .kicker::after {
      content: "";
      flex: 0 1 2.5rem;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.28), transparent);
    }
    .brand {
      margin: 0 0 0.5rem;
      font-size: clamp(1.85rem, 7vw, 3rem);
      font-weight: 800;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.94);
      text-shadow: 0 0 48px rgba(133, 14, 73, 0.55);
    }
    h1 {
      margin: 0 0 0.35rem;
      font-size: clamp(0.85rem, 2vw, 1rem);
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.78);
    }
    .sub {
      margin: 0 0 2.5rem;
      max-width: 26rem;
      font-size: 0.88rem;
      color: var(--text-soft);
      line-height: 1.55;
    }
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      max-width: 40rem;
    }
    .grid a {
      flex: 1 1 240px;
      max-width: 18rem;
      padding: 1.35rem 1.25rem;
      text-decoration: none;
      color: rgba(255, 255, 255, 0.9);
      background: rgba(12, 12, 14, 0.72);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(133, 14, 73, 0.35);
      border-radius: 6px;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 20px 60px rgba(0, 0, 0, 0.5);
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
    }
    .grid a:hover {
      border-color: var(--accent);
      box-shadow: 0 0 36px rgba(133, 14, 73, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.08);
      transform: translateY(-2px);
    }
    .grid a strong {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.45rem;
    }
    .grid a span {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-soft);
    }
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 1rem;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="kicker">Documentación</p>
    <p class="brand">EXYLON</p>
    <h1>Normativa pública</h1>
    <p class="sub">Consulta la normativa vigente de comercios o de talleres.</p>
    <div class="grid">
      <a href="normativa-negocios.html">
        <strong>Comercios</strong>
        <span>Hostelería y establecimientos comerciales</span>
      </a>
      <a href="normativa-talleres.html">
        <strong>Talleres</strong>
        <span>Mecánica, grúa y niveles del taller</span>
      </a>
    </div>
  </div>
  <footer>EXYLON · normativa</footer>
</body>
</html>
